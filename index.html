<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奕境售后管理系统</title>
  <style>
    :root {
      --primary-color: #861B2F;
      --sidebar-bg: #F5F7FA;
      --sidebar-text: #333;
      --sidebar-hover: rgba(134, 27, 47, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* 侧边导航栏 */
    .sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      position: fixed;
      height: 100vh;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .sidebar.collapsed {
      width: 50px;
    }

    /* 系统标题 */
    .system-title {
      padding: 20px 15px;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-align: center;
    }

    .sidebar.collapsed .system-title {
      font-size: 0;
      padding: 20px 0;
    }
